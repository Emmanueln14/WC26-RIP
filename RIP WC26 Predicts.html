function obtenerValorColumna(objetoFila, nombreColumnaOriginal) {
    if (!objetoFila) return "";
    const limpiar = (texto) => texto.toString().toLowerCase().replace(/[^a-z0-9]/g, "");
    const claveBuscada = limpiar(nombreColumnaOriginal);
    
    for (let clave in objetoFila) {
        let claveFilaLimpia = limpiar(clave);
        if (claveFilaLimpia.includes(claveBuscada) || claveBuscada.includes(claveFilaLimpia) || 
            (claveBuscada.includes("corea") && claveFilaLimpia.includes("corea"))) { 
            return objetoFila[clave];
        }
    }
    return "";
}

    });

        fetch(URL_RESPUESTAS).then(res => res.json()),
        fetch(URL_LIVE + "?raw=true").then(res => res.json()).catch(() => []),
        fetch(URL_CONFIG).then(res => res.json()).catch(() => [])

function cargarStreamM3U8(url) {
    const video = document.getElementById("video-player");
    if (!video || !url) return;

    
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }

    const esHLS = url.includes("m3u8");

    if (esHLS && Hls.isSupported()) {
        const configHls = {
            maxBufferLength: 8,
            maxMaxBufferLength: 15,
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 0
        };

        hlsInstance = new Hls(configHls);
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        
        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        hlsInstance.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        hlsInstance.recoverMediaError();
                        break;
                }
            }
        });
    } 
    
    else {
        console.log("Forzando decodificación en tiempo real para stream infinito...");
        
        
        video.removeAttribute("src");
        
        
        video.src = url;
        
        video.type = 'video/mp2t'; 
        
        
        // video.type = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"';
        
        video.load(); 
    }

    
    if (!plyrPlayer) {
        plyrPlayer = new Plyr(video, {
            controls: ['play', 'current-time', 'mute', 'volume', 'fullscreen'], 
            keyboard: { focused: true, global: true }
        });
    }
}

    if (hayPartidoEnVivoEnEsteGrupo && urlObjetivo) {
        if (elementVideo.style.display !== "block") {
            elementVideo.style.display = "block";
        }
        const videoElement = document.getElementById("video-player");
        if (videoElement && !videoElement.src && !hlsInstance) {
            cargarStreamM3U8(urlObjetivo);
        }
    } else {
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        if (plyrPlayer) {
            plyrPlayer.destroy();
            plyrPlayer = null;
        }
        elementVideo.style.display = "none";  
    }

function procesarSimulacion() {
    const grupo = document.getElementById("select-grupo").value;
    const usuarioElegido = document.getElementById("select-usuario").value;
    const contenedor = document.getElementById("contenedor-simulador");
    
    if(!dbRespuestas.length || !usuarioElegido) return;

    const jugadorData = dbRespuestas.find(f => {
        let nombre = f["Nombre"] || f["nombre"] || obtenerValorColumna(f, "Nombre");
        return nombre === usuarioElegido;
    });
    
    const partidosGrupo = GRUPOS_FÚTBOL[grupo] || [];
    let tablaPaises = {};
    let htmlPartidos = `<h3 style="color:#64f5e6; margin: 30px 0 15px; font-size:1.2rem;">REVISIÓN DE PREDICCIONES</h3>`;
    
    
    hayPartidoEnVivoEnEsteGrupo = false;

    partidosGrupo.forEach(partido => {
        let pred = obtenerValorColumna(jugadorData, partido.columna);
        let real = obtenerValorColumna(filaMaestro, partido.columna);

        if (!tablaPaises[partido.local]) tablaPaises[partido.local] = 0;
        if (!tablaPaises[partido.visitante]) tablaPaises[partido.visitante] = 0;

        let predUpper = pred ? pred.toUpperCase().trim() : "";
        const limpiarParaPuntos = (t) => t ? t.toString().toUpperCase().replace(/[^A-Z0-9]/g, "") : "";
        
        let predLimpia = limpiarParaPuntos(predUpper);
        let localLimpia = limpiarParaPuntos(partido.local);
        let visitanteLimpia = limpiarParaPuntos(partido.visitante);

        if (predUpper !== "") {
            if (predUpper === "GANA LOCAL" || predLimpia.includes(localLimpia)) {
                tablaPaises[partido.local] += 3;
            } 
            else if (predUpper === "GANA VISITANTE" || predLimpia.includes(visitanteLimpia)) {
                tablaPaises[partido.visitante] += 3;
            } 
            else if (predUpper.includes("EMPATE")) {
                tablaPaises[partido.local] += 1;
                tablaPaises[partido.visitante] += 1;
            }
        }
        let etiquetaLive = "";
        let esLive = false;
        
        if (dbLive && dbLive.length > 0) {
            const limpiarTexto = (t) => t ? t.toString().toLowerCase().replace(/[^a-z0-9]/g, "") : "";
            
            let raizLocal = limpiarTexto(partido.local).substring(0, 3);
            let raizVisita = limpiarTexto(partido.visitante).substring(0, 3);

            let partidoEncontrado = dbLive.find(l => {
                let textoPartidoSheet = l["Partido"] || l["partido"] || "";
                let textoPartidoLimpio = limpiarTexto(textoPartidoSheet);
                
                if(!textoPartidoLimpio) return false;

                return textoPartidoLimpio.includes(raizLocal) && 
                       (textoPartidoLimpio.includes(raizVisita) || 
                        (partido.visitante.includes("Congo") && textoPartidoLimpio.includes("congo")));
            });

            if (partidoEncontrado) {
                let estadoActual = partidoEncontrado["Estado"] || partidoEncontrado["estado"] || "";
                if (estadoActual.trim() !== "" && !estadoActual.includes("http")) {
                    esLive = true;
                    hayPartidoEnVivoEnEsteGrupo = true; 
                    etiquetaLive = `<span style="background: #ff3a3a; color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; margin-left: 10px; font-weight: 900; letter-spacing: 1px; box-shadow: 0 0 8px #ff3a3a; animation: parpadeo 1s infinite;">🔴 ${estadoActual}</span>`;
                }
            }
        }

        let realLimpio = real ? real.toUpperCase().trim() : "";
        let esAcertado = (!esLive && real && !realLimpio.includes("PENDIENTE") && realLimpio === predUpper);
        
        let cardClass = esAcertado ? "match-card acertado" : "match-card";
        
        let statusSigno = "";
        if (esLive) {
            statusSigno = '<span class="status-tag wait" style="animation: parpadeo 1.5s infinite;">⏳ EN CURSO</span>';
        } else if (esAcertado) {
            statusSigno = '<span class="status-tag ok">✔ ACERTADO (+3 pts)</span>';
        } else {
            let textoReal = real || 'Pendiente';
            statusSigno = `<span class="status-tag fail">✘ NO ACERTADO (Real: ${textoReal})</span>`;
        }

        let nombreLocal = partido.localMostrar || partido.local;
        let nombreVisita = partido.visitanteMostrar || partido.visitante;

        htmlPartidos += `
            <div class="${cardClass}">
                <div>
                    <strong>${nombreLocal} vs ${nombreVisita} ${etiquetaLive}</strong><br>
                    <span style="color:#b5dada; font-size:0.9rem;">Tu predicción: ${pred || 'Ninguna'}</span>
                </div>
                <div>${statusSigno}</div>
            </div>`;
    });

    let sortedPaises = Object.keys(tablaPaises).map(name => ({ name: name, pts: tablaPaises[name] }));
    sortedPaises.sort((a,b) => b.pts - a.pts);

    let htmlTabla = `<h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">TABLA SIMULADA DEL GRUPO</h3>`;
    sortedPaises.forEach((pais, index) => {
        let nombrePaisImprimir = pais.name.toUpperCase() === "COREA" ? "COREA DEL SUR" : pais.name.toUpperCase();

        htmlTabla += `
            <div class="row">
                <div class="rank normal" style="background:#003f42; font-size:1.5rem;">${index + 1}</div>
                <div class="name">${nombrePaisImprimir}</div>
                <div class="points" style="background:#ff6f00; color:white; font-size:1.5rem; width:100px;">${pais.pts} PTS</div>
            </div>`;
    });

    contenedor.innerHTML = htmlTabla + htmlPartidos;
    
    
    actualizarVisibilidadReproductor();
}

</script>

<div class="hero">
    <h6 style="color:white; font-size:0.8rem; font-style: italic;">*Cada partido acertado son 3 puntos. Acertar la final son 10 pts extras y el campeón 5 pts más.</h6>
</div>
